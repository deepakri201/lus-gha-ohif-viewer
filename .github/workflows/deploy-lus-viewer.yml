name: ohif/deploy-lus-viewer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v4

      - name: Clone Viewers fork
        run: |
          git clone https://github.com/deepakri201/Viewers.git
          cd Viewers
          git checkout "${{ vars.VIEWERS_REF || 'add_gcp_and_sr' }}"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: Viewers/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: Viewers
        run: pnpm install --frozen-lockfile

      - name: Apply optional external config
        working-directory: Viewers
        run: |
          if [ -n "${{ vars.OHIF_FIREBASE_JSON_URL }}" ]; then
            wget -O ./firebase.json "${{ vars.OHIF_FIREBASE_JSON_URL }}"
          fi
          if [ -n "${{ vars.OHIF_CONFIG_JS_URL }}" ]; then
            wget -O ./platform/app/public/config/google.js "${{ vars.OHIF_CONFIG_JS_URL }}"
          fi

      - name: Build OHIF viewer
        working-directory: Viewers
        run: PUBLIC_URL=/ pnpm --filter @ohif/app run build:viewer:qa

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          expires: 5d
          projectId: "${{ vars.FIREBASE_PROJECT_ID }}"
          entryPoint: ./Viewers
          channelId: live
